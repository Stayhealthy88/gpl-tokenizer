<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      .header { font-size: 22px; font-weight: 600; fill: #1f2937; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { font-size: 13px; font-weight: 500; fill: #374151; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .sublabel { font-size: 11px; fill: #6b7280; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .token-label { font-size: 10px; font-weight: 500; fill: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .warning { fill: #dc2626; }
      .success { fill: #16a34a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="white"/>

  <!-- Header -->
  <text x="400" y="35" class="header" text-anchor="middle">Geometry-Aware Tokenization vs BPE</text>
  <text x="400" y="55" class="sublabel" text-anchor="middle">How GPL preserves structural information</text>

  <!-- Top section: Original curve -->
  <text x="400" y="90" class="label" text-anchor="middle" font-size="14">Original Path: M 20 50 C 40 10, 65 10, 95 80</text>
  <path d="M 80 180 C 100 140, 125 140, 155 220" stroke="#2563eb" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Start point -->
  <circle cx="80" cy="180" r="3" fill="#2563eb"/>
  <text x="75" y="170" class="sublabel">start</text>
  <!-- End point -->
  <circle cx="155" cy="220" r="3" fill="#2563eb"/>
  <text x="160" y="225" class="sublabel">end</text>
  <!-- Control points -->
  <circle cx="100" cy="140" r="2.5" fill="#2563eb" opacity="0.5"/>
  <circle cx="125" cy="140" r="2.5" fill="#2563eb" opacity="0.5"/>

  <!-- BPE section (left) -->
  <g>
    <text x="200" y="280" class="label" text-anchor="middle" font-weight="600">BPE Tokenization</text>

    <!-- Token boxes -->
    <rect x="75" y="300" width="30" height="28" rx="4" class="warning" opacity="0.8"/>
    <text x="90" y="321" class="token-label" text-anchor="middle" font-size="9">C</text>

    <rect x="110" y="300" width="30" height="28" rx="4" class="warning" opacity="0.7"/>
    <text x="125" y="321" class="token-label" text-anchor="middle" font-size="8">4</text>

    <rect x="145" y="300" width="30" height="28" rx="4" class="warning" opacity="0.7"/>
    <text x="160" y="321" class="token-label" text-anchor="middle" font-size="8">0</text>

    <rect x="180" y="300" width="30" height="28" rx="4" class="warning" opacity="0.7"/>
    <text x="195" y="321" class="token-label" text-anchor="middle" font-size="8">1</text>

    <rect x="215" y="300" width="30" height="28" rx="4" class="warning" opacity="0.7"/>
    <text x="230" y="321" class="token-label" text-anchor="middle" font-size="8">0</text>

    <rect x="250" y="300" width="35" height="28" rx="4" class="warning" opacity="0.6"/>
    <text x="267" y="321" class="token-label" text-anchor="middle" font-size="8">...</text>

    <!-- Result label -->
    <text x="200" y="355" class="sublabel" text-anchor="middle" font-weight="500" class="warning">15+ fragmented tokens</text>
    <text x="200" y="372" class="sublabel" text-anchor="middle">Geometry destroyed</text>
  </g>

  <!-- GPL section (right) -->
  <g>
    <text x="600" y="280" class="label" text-anchor="middle" font-weight="600">GPL Tokenization</text>

    <!-- Token boxes with semantic meaning -->
    <rect x="480" y="300" width="50" height="28" rx="4" fill="#059669" opacity="0.85"/>
    <text x="505" y="321" class="token-label" text-anchor="middle" font-size="9">CUBIC</text>

    <rect x="535" y="300" width="38" height="28" rx="4" fill="#0891b2" opacity="0.85"/>
    <text x="554" y="321" class="token-label" text-anchor="middle" font-size="8">[q4:5]</text>

    <rect x="578" y="300" width="38" height="28" rx="4" fill="#0891b2" opacity="0.85"/>
    <text x="597" y="321" class="token-label" text-anchor="middle" font-size="8">[q4:1]</text>

    <rect x="621" y="300" width="38" height="28" rx="4" fill="#0891b2" opacity="0.85"/>
    <text x="640" y="321" class="token-label" text-anchor="middle" font-size="8">[q4:8]</text>

    <rect x="664" y="300" width="38" height="28" rx="4" fill="#0891b2" opacity="0.85"/>
    <text x="683" y="321" class="token-label" text-anchor="middle" font-size="8">[κ3]</text>

    <rect x="707" y="300" width="38" height="28" rx="4" fill="#059669" opacity="0.75"/>
    <text x="726" y="321" class="token-label" text-anchor="middle" font-size="9">END</text>

    <!-- Result label -->
    <text x="600" y="355" class="sublabel" text-anchor="middle" font-weight="500" class="success">6 semantic tokens</text>
    <text x="600" y="372" class="sublabel" text-anchor="middle">Geometry preserved</text>
  </g>

  <!-- Bottom comparison boxes -->
  <g>
    <!-- BPE issue box -->
    <rect x="50" y="390" width="300" height="25" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="200" y="408" class="sublabel" text-anchor="middle" font-weight="500" fill="#991b1b">❌ Lost structure: no understanding of curve control</text>

    <!-- GPL benefit box -->
    <rect x="450" y="390" width="300" height="25" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="600" y="408" class="sublabel" text-anchor="middle" font-weight="500" fill="#166534">✓ Preserved structure: quantized coordinates + curvature</text>
  </g>
</svg>