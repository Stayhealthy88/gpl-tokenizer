<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" width="800" height="300">
  <!-- White background -->
  <rect width="800" height="300" fill="white"/>

  <!-- Title -->
  <text x="400" y="25" font-size="24" font-weight="bold" text-anchor="middle" font-family="sans-serif" fill="#1f2937">SVG Shape Morphing — GPL Token Sequence</text>

  <!-- Left shape: 8-pointed star -->
  <g transform="translate(150, 120)">
    <polygon points="0,-60 21,-21 60,-15 30,15 36,54 0,30 -36,54 -30,15 -60,-15 -21,-21"
             stroke="#2563eb" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <text x="0" y="90" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#666">M0,-60 L21,-21 L60,-15...</text>
    <text x="0" y="105" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif" fill="#2563eb" background="white">[POLYGON 8pts → 12 tokens]</text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line x1="280" y1="120" x2="340" y2="120" stroke="#9ca3af" stroke-width="2"/>
    <polygon points="340,120 330,115 332,120 330,125" fill="#9ca3af"/>
    <text x="310" y="110" font-size="12" font-family="sans-serif" fill="#6b7280" text-anchor="middle">morphTo()</text>
  </g>

  <!-- Center shape: morphed blob -->
  <g transform="translate(400, 120)">
    <path d="M0,-55 Q40,-40 45,-10 Q50,20 30,50 Q0,55 -30,50 Q-50,20 -45,-10 Q-40,-40 0,-55"
          stroke="#2563eb" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <text x="0" y="90" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#666">M0,-55 Q40,-40...</text>
    <text x="0" y="105" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif" fill="#2563eb">[MORPH → 8 tokens]</text>
  </g>

  <!-- Arrow 2 -->
  <g>
    <line x1="530" y1="120" x2="590" y2="120" stroke="#9ca3af" stroke-width="2"/>
    <polygon points="590,120 580,115 582,120 580,125" fill="#9ca3af"/>
    <text x="560" y="110" font-size="12" font-family="sans-serif" fill="#6b7280" text-anchor="middle">morphTo()</text>
  </g>

  <!-- Right shape: circle -->
  <g transform="translate(650, 120)">
    <circle cx="0" cy="0" r="50" stroke="#2563eb" stroke-width="2" fill="none"/>
    <text x="0" y="90" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#666">M50,0 A50,50...</text>
    <text x="0" y="105" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif" fill="#2563eb">[CIRCLE → 4 tokens]</text>
  </g>
</svg>
