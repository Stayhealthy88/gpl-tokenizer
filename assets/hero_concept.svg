<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)" rx="16"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" font-family="system-ui, sans-serif">Why AI Can't Draw Properly — and How We Fix It</text>

  <!-- LEFT: The Problem -->
  <rect x="30" y="65" width="355" height="300" rx="14" fill="white" stroke="#fecaca" stroke-width="2"/>
  <rect x="30" y="65" width="355" height="40" rx="14" fill="#fef2f2"/>
  <rect x="30" y="91" width="355" height="14" fill="#fef2f2"/>
  <circle cx="52" cy="85" r="10" fill="#ef4444"/>
  <text x="52" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="white" font-family="system-ui, sans-serif">!</text>
  <text x="72" y="90" font-size="15" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">The Problem: Broken Geometry</text>

  <!-- Problem illustration: circle attempt -->
  <text x="207" y="130" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">AI tries to draw a circle...</text>

  <!-- Intended circle (dashed) -->
  <circle cx="140" cy="200" r="50" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="270" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui, sans-serif">Intended</text>

  <!-- Arrow -->
  <line x1="200" y1="200" x2="225" y2="200" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="225,195 235,200 225,205" fill="#cbd5e1"/>

  <!-- Broken result -->
  <path d="M 315 155 C 340 140, 355 170, 340 200 C 325 230, 280 245, 270 210 C 260 175, 285 150, 315 155" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <text x="295" y="270" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="600" font-family="system-ui, sans-serif">AI's Result</text>

  <!-- Explanation -->
  <text x="207" y="305" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">Standard AI reads coordinates as random text</text>
  <text x="207" y="322" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">fragments — like reading a map with</text>
  <text x="207" y="339" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">the numbers scrambled.</text>

  <!-- RIGHT: The Solution -->
  <rect x="415" y="65" width="355" height="300" rx="14" fill="white" stroke="#bbf7d0" stroke-width="2"/>
  <rect x="415" y="65" width="355" height="40" rx="14" fill="#f0fdf4"/>
  <rect x="415" y="91" width="355" height="14" fill="#f0fdf4"/>
  <circle cx="437" cy="85" r="10" fill="#22c55e"/>
  <text x="437" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="white" font-family="system-ui, sans-serif">&#10003;</text>
  <text x="457" y="90" font-size="15" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Our Solution: GPL Tokenizer</text>

  <!-- Solution illustration -->
  <text x="592" y="130" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">AI draws with geometric understanding</text>

  <!-- Token flow visualization -->
  <rect x="445" y="148" width="58" height="28" rx="6" fill="#059669"/>
  <text x="474" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="white" font-family="system-ui, sans-serif">Circle</text>

  <rect x="510" y="148" width="70" height="28" rx="6" fill="#0891b2"/>
  <text x="545" y="166" text-anchor="middle" font-size="10" font-weight="500" fill="white" font-family="system-ui, sans-serif">center(5,5)</text>

  <rect x="587" y="148" width="60" height="28" rx="6" fill="#0891b2"/>
  <text x="617" y="166" text-anchor="middle" font-size="10" font-weight="500" fill="white" font-family="system-ui, sans-serif">radius(3)</text>

  <!-- Arrow down -->
  <line x1="545" y1="180" x2="545" y2="195" stroke="#22c55e" stroke-width="2"/>
  <polygon points="540,195 545,205 550,195" fill="#22c55e"/>

  <!-- Perfect circle result -->
  <circle cx="592" cy="240" r="50" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="592" cy="240" r="2" fill="#22c55e"/>
  <text x="592" y="310" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="600" font-family="system-ui, sans-serif">Perfect Result</text>

  <!-- Explanation -->
  <text x="592" y="335" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">GPL translates graphics into a language</text>
  <text x="592" y="352" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">AI can truly understand — preserving</text>
  <text x="592" y="369" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">shapes, positions, and relationships.</text>
</svg>
