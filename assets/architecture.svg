<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      .header { font-size: 20px; font-weight: 600; fill: #1f2937; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .box-label { font-size: 12px; font-weight: 500; fill: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-anchor: middle; }
      .sublabel { font-size: 10px; fill: #6b7280; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <!-- Gradients for color progression -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.95" />
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" class="header" text-anchor="middle">GPL Tokenizer Architecture</text>

  <!-- Pipeline boxes -->

  <!-- 1. SVG Parser -->
  <rect x="10" y="60" width="85" height="70" rx="8" fill="url(#grad1)"/>
  <text x="52.5" y="97" class="box-label">SVG</text>
  <text x="52.5" y="112" class="box-label">Parser</text>

  <!-- Arrow 1 -->
  <line x1="95" y1="95" x2="120" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 2. Path Parser -->
  <rect x="120" y="60" width="85" height="70" rx="8" fill="url(#grad2)"/>
  <text x="162.5" y="97" class="box-label">Path</text>
  <text x="162.5" y="112" class="box-label">Parser</text>

  <!-- Arrow 2 -->
  <line x1="205" y1="95" x2="230" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 3. Curvature Analyzer -->
  <rect x="230" y="60" width="90" height="70" rx="8" fill="url(#grad2)"/>
  <text x="275" y="97" class="box-label">Curvature</text>
  <text x="275" y="112" class="box-label">Analyzer</text>

  <!-- Arrow 3 -->
  <line x1="320" y1="95" x2="345" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 4. Continuity Analyzer -->
  <rect x="345" y="60" width="90" height="70" rx="8" fill="url(#grad3)"/>
  <text x="390" y="97" class="box-label">Continuity</text>
  <text x="390" y="112" class="box-label">Analyzer</text>

  <!-- Arrow 4 -->
  <line x1="435" y1="95" x2="460" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 5. ARCS -->
  <rect x="460" y="60" width="75" height="70" rx="8" fill="url(#grad3)"/>
  <text x="497.5" y="97" class="box-label">ARCS</text>
  <text x="497.5" y="112" class="box-label">Solver</text>

  <!-- Arrow 5 -->
  <line x1="535" y1="95" x2="560" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 6. Primitive Tokenizer -->
  <rect x="560" y="60" width="90" height="70" rx="8" fill="url(#grad4)"/>
  <text x="605" y="97" class="box-label">Primitive</text>
  <text x="605" y="112" class="box-label">Tokenizer</text>

  <!-- Arrow 6 -->
  <line x1="650" y1="95" x2="675" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 7. Token IDs -->
  <rect x="675" y="60" width="75" height="70" rx="8" fill="url(#grad4)"/>
  <text x="712.5" y="100" class="box-label">Token</text>
  <text x="712.5" y="115" class="box-label">IDs</text>

  <!-- Arrow 7 -->
  <line x1="750" y1="95" x2="775" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 8. Detokenizer -->
  <rect x="775" y="60" width="75" height="70" rx="8" fill="url(#grad5)"/>
  <text x="812.5" y="100" class="box-label">De-</text>
  <text x="812.5" y="115" class="box-label">tokenizer</text>

  <!-- Arrow 8 -->
  <line x1="850" y1="95" x2="875" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Final: Valid SVG -->
  <rect x="875" y="60" width="20" height="70" rx="8" fill="#22c55e" opacity="0.9"/>
  <text x="885" y="107" class="box-label" font-size="20">✓</text>

  <!-- Bottom labels for stages -->
  <g class="sublabel" font-size="9">
    <text x="52.5" y="150" text-anchor="middle">Parse</text>
    <text x="162.5" y="150" text-anchor="middle">Decompose</text>
    <text x="275" y="150" text-anchor="middle">Analyze</text>
    <text x="390" y="150" text-anchor="middle">Analyze</text>
    <text x="497.5" y="150" text-anchor="middle">Solve</text>
    <text x="605" y="150" text-anchor="middle">Encode</text>
    <text x="712.5" y="150" text-anchor="middle">Output</text>
    <text x="812.5" y="150" text-anchor="middle">Decode</text>
  </g>

  <!-- Data flow description -->
  <text x="450" y="190" class="sublabel" text-anchor="middle" font-size="11" font-weight="500" fill="#374151">
    Tokenization (left) → Reconstruction (right)
  </text>
  <text x="450" y="205" class="sublabel" text-anchor="middle" font-size="10">
    Input: SVG path commands | Output: Compact token sequence | Lossless round-trip
  </text>
</svg>