<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <rect width="900" height="200" fill="white" rx="12"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937" font-family="sans-serif">GPL Tokenizer Pipeline</text>

  <!-- 1. SVG Text -->
  <rect x="10" y="55" width="80" height="55" rx="8" fill="#3b82f6"/>
  <text x="50" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">SVG</text>
  <text x="50" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Parser</text>
  <text x="50" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">XML parse</text>

  <!-- Arrow -->
  <polygon points="95,82 105,78 105,86" fill="#9ca3af"/>

  <!-- 2. Path Parser -->
  <rect x="110" y="55" width="80" height="55" rx="8" fill="#2563eb"/>
  <text x="150" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Path</text>
  <text x="150" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Parser</text>
  <text x="150" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">d attribute</text>

  <polygon points="195,82 205,78 205,86" fill="#9ca3af"/>

  <!-- 3. Curvature -->
  <rect x="210" y="55" width="88" height="55" rx="8" fill="#0ea5e9"/>
  <text x="254" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Curvature</text>
  <text x="254" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Analyzer</text>
  <text x="254" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">k, arc len</text>

  <polygon points="303,82 313,78 313,86" fill="#9ca3af"/>

  <!-- 4. Continuity -->
  <rect x="318" y="55" width="88" height="55" rx="8" fill="#0891b2"/>
  <text x="362" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Continuity</text>
  <text x="362" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Analyzer</text>
  <text x="362" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">G0/G1/G2</text>

  <polygon points="411,82 421,78 421,86" fill="#9ca3af"/>

  <!-- 5. ARCS -->
  <rect x="426" y="55" width="70" height="55" rx="8" fill="#14b8a6"/>
  <text x="461" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">ARCS</text>
  <text x="461" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Solver</text>
  <text x="461" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">Quadtree</text>

  <polygon points="501,82 511,78 511,86" fill="#9ca3af"/>

  <!-- 6. Primitive Tokenizer -->
  <rect x="516" y="55" width="88" height="55" rx="8" fill="#10b981"/>
  <text x="560" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Primitive</text>
  <text x="560" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Tokenizer</text>
  <text x="560" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">Encode</text>

  <polygon points="609,82 619,78 619,86" fill="#9ca3af"/>

  <!-- 7. Token IDs (highlighted) -->
  <rect x="624" y="50" width="75" height="65" rx="10" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="661" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="white" font-family="sans-serif">Token</text>
  <text x="661" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white" font-family="sans-serif">IDs</text>
  <text x="661" y="130" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">5,561 vocab</text>

  <polygon points="704,82 714,78 714,86" fill="#9ca3af"/>

  <!-- 8. Detokenizer -->
  <rect x="719" y="55" width="85" height="55" rx="8" fill="#059669"/>
  <text x="761" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">De-</text>
  <text x="761" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">tokenizer</text>
  <text x="761" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">Decode</text>

  <polygon points="809,82 819,78 819,86" fill="#9ca3af"/>

  <!-- 9. Valid SVG -->
  <rect x="824" y="55" width="65" height="55" rx="8" fill="#22c55e"/>
  <text x="856" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">Valid</text>
  <text x="856" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="white" font-family="sans-serif">SVG</text>
  <text x="856" y="125" text-anchor="middle" font-size="9" fill="#6b7280" font-family="sans-serif">Round-trip</text>

  <!-- Bottom labels -->
  <rect x="10" y="150" width="493" height="22" rx="4" fill="#eff6ff"/>
  <text x="256" y="165" text-anchor="middle" font-size="10" font-weight="500" fill="#1e40af" font-family="sans-serif">Tokenization (SVG to Token IDs)</text>

  <rect x="624" y="150" width="265" height="22" rx="4" fill="#f0fdf4"/>
  <text x="756" y="165" text-anchor="middle" font-size="10" font-weight="500" fill="#166534" font-family="sans-serif">Reconstruction (Token IDs to SVG)</text>

  <!-- Bottom note -->
  <text x="450" y="190" text-anchor="middle" font-size="10" fill="#9ca3af" font-family="sans-serif">Lossless round-trip: Original SVG = Reconstructed SVG (within quantization tolerance)</text>
</svg>
