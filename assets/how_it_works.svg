<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <rect width="800" height="340" fill="#fafbfc" rx="16"/>

  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a" font-family="system-ui, sans-serif">How GPL Tokenizer Works — Three Simple Steps</text>

  <!-- Step 1 -->
  <rect x="30" y="60" width="230" height="260" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="145" cy="88" r="18" fill="#3b82f6"/>
  <text x="145" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="white" font-family="system-ui, sans-serif">1</text>
  <text x="145" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b" font-family="system-ui, sans-serif">Read the Drawing</text>

  <!-- SVG code representation -->
  <rect x="50" y="140" width="190" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="145" y="160" text-anchor="middle" font-size="10" fill="#64748b" font-family="monospace">&lt;svg&gt;</text>
  <text x="145" y="175" text-anchor="middle" font-size="10" fill="#3b82f6" font-family="monospace">&lt;circle cx="50" r="20"/&gt;</text>
  <text x="145" y="190" text-anchor="middle" font-size="10" fill="#64748b" font-family="monospace">&lt;/svg&gt;</text>

  <text x="145" y="225" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">Parse vector graphics into</text>
  <text x="145" y="241" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">geometric building blocks:</text>
  <text x="145" y="260" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">shapes, curves, positions</text>

  <!-- Arrow 1→2 -->
  <line x1="265" y1="190" x2="283" y2="190" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="283,185 293,190 283,195" fill="#94a3b8"/>

  <!-- Step 2 -->
  <rect x="290" y="60" width="230" height="260" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="405" cy="88" r="18" fill="#8b5cf6"/>
  <text x="405" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="white" font-family="system-ui, sans-serif">2</text>
  <text x="405" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b" font-family="system-ui, sans-serif">Translate to Tokens</text>

  <!-- Token boxes -->
  <g transform="translate(310, 145)">
    <rect x="0" y="0" width="55" height="24" rx="5" fill="#059669"/>
    <text x="27" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="white" font-family="system-ui, sans-serif">CIRCLE</text>

    <rect x="60" y="0" width="55" height="24" rx="5" fill="#0891b2"/>
    <text x="87" y="16" text-anchor="middle" font-size="9" font-weight="500" fill="white" font-family="system-ui, sans-serif">center</text>

    <rect x="120" y="0" width="55" height="24" rx="5" fill="#0891b2"/>
    <text x="147" y="16" text-anchor="middle" font-size="9" font-weight="500" fill="white" font-family="system-ui, sans-serif">radius</text>

    <!-- vs BPE -->
    <rect x="0" y="35" width="175" height="22" rx="5" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="87" y="50" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">BPE: "c","i","r","c","l","e"... 15+ fragments</text>
  </g>

  <text x="405" y="235" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">Convert each shape into</text>
  <text x="405" y="251" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">compact, meaningful tokens</text>
  <text x="405" y="267" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">that preserve geometry.</text>

  <!-- Arrow 2→3 -->
  <line x1="525" y1="190" x2="543" y2="190" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="543,185 553,190 543,195" fill="#94a3b8"/>

  <!-- Step 3 -->
  <rect x="550" y="60" width="230" height="260" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="665" cy="88" r="18" fill="#f59e0b"/>
  <text x="665" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="white" font-family="system-ui, sans-serif">3</text>
  <text x="665" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b" font-family="system-ui, sans-serif">AI Understands &amp; Creates</text>

  <!-- AI brain + shapes -->
  <g transform="translate(610, 140)">
    <!-- Brain icon (simplified) -->
    <rect x="20" y="0" width="70" height="55" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="55" y="24" text-anchor="middle" font-size="22" font-family="system-ui, sans-serif">&#129302;</text>
    <text x="55" y="44" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e" font-family="system-ui, sans-serif">AI Model</text>
  </g>

  <!-- Output shapes -->
  <g transform="translate(618, 210)">
    <circle cx="15" cy="12" r="10" fill="none" stroke="#22c55e" stroke-width="2"/>
    <rect x="38" y="2" width="20" height="20" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="80,22 90,2 100,22" fill="none" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <text x="665" y="255" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">AI generates or edits</text>
  <text x="665" y="271" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">vector graphics with true</text>
  <text x="665" y="287" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui, sans-serif">geometric precision.</text>
</svg>
