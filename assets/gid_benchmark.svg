<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <rect width="700" height="320" fill="white" rx="12"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937" font-family="sans-serif">GID Benchmark: GPL vs BPE</text>
  <text x="350" y="45" text-anchor="middle" font-size="10" fill="#6b7280" font-family="sans-serif">Geometric Information Density — higher = more geometry per token</text>

  <!-- Y-axis line -->
  <line x1="150" y1="58" x2="150" y2="280" stroke="#e5e7eb" stroke-width="1"/>

  <!-- BPE baseline at 1.0x -->
  <line x1="150" y1="58" x2="150" y2="280" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="153" y="55" font-size="9" font-weight="600" fill="#ef4444" font-family="sans-serif">1.0x BPE baseline</text>

  <!-- Grid lines -->
  <line x1="260" y1="58" x2="260" y2="280" stroke="#f3f4f6" stroke-width="1"/>
  <text x="260" y="295" text-anchor="middle" font-size="9" fill="#d1d5db" font-family="sans-serif">2.0x</text>
  <line x1="370" y1="58" x2="370" y2="280" stroke="#f3f4f6" stroke-width="1"/>
  <text x="370" y="295" text-anchor="middle" font-size="9" fill="#d1d5db" font-family="sans-serif">3.0x</text>
  <line x1="480" y1="58" x2="480" y2="280" stroke="#f3f4f6" stroke-width="1"/>
  <text x="480" y="295" text-anchor="middle" font-size="9" fill="#d1d5db" font-family="sans-serif">4.0x</text>

  <!-- Scale: 1.0x = 0px from x=150, each 1.0x = 110px -->

  <!-- 1. Simple line: 2.7x -->
  <text x="145" y="82" text-anchor="end" font-size="12" font-weight="500" fill="#374151" font-family="sans-serif">Simple line</text>
  <rect x="150" y="68" width="187" height="22" rx="4" fill="#3b82f6"/>
  <rect x="150" y="68" width="187" height="22" rx="4" fill="#2563eb" opacity="0.8"/>
  <text x="345" y="84" font-size="12" font-weight="700" fill="#1e40af" font-family="sans-serif">2.7x</text>

  <!-- 2. Rectangle: 1.6x -->
  <text x="145" y="119" text-anchor="end" font-size="12" font-weight="500" fill="#374151" font-family="sans-serif">Rectangle</text>
  <rect x="150" y="105" width="66" height="22" rx="4" fill="#3b82f6"/>
  <text x="224" y="121" font-size="12" font-weight="700" fill="#1e40af" font-family="sans-serif">1.6x</text>

  <!-- 3. Cubic Bezier: 1.6x -->
  <text x="145" y="156" text-anchor="end" font-size="12" font-weight="500" fill="#374151" font-family="sans-serif">Cubic Bezier</text>
  <rect x="150" y="142" width="66" height="22" rx="4" fill="#3b82f6"/>
  <text x="224" y="158" font-size="12" font-weight="700" fill="#1e40af" font-family="sans-serif">1.6x</text>

  <!-- 4. Triangle icon: 3.4x (best - highlight) -->
  <text x="145" y="193" text-anchor="end" font-size="12" font-weight="600" fill="#166534" font-family="sans-serif">Triangle icon</text>
  <rect x="150" y="179" width="264" height="22" rx="4" fill="#10b981"/>
  <text x="422" y="195" font-size="12" font-weight="700" fill="#166534" font-family="sans-serif">3.4x</text>
  <!-- Best badge -->
  <rect x="450" y="182" width="35" height="16" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="467" y="193" text-anchor="middle" font-size="8" font-weight="600" fill="#166534" font-family="sans-serif">BEST</text>

  <!-- 5. Multi-path: 2.8x -->
  <text x="145" y="230" text-anchor="end" font-size="12" font-weight="500" fill="#374151" font-family="sans-serif">Multi-path</text>
  <rect x="150" y="216" width="198" height="22" rx="4" fill="#3b82f6"/>
  <text x="356" y="232" font-size="12" font-weight="700" fill="#1e40af" font-family="sans-serif">2.8x</text>

  <!-- 6. Star icon: 2.2x -->
  <text x="145" y="267" text-anchor="end" font-size="12" font-weight="500" fill="#374151" font-family="sans-serif">Star icon</text>
  <rect x="150" y="253" width="132" height="22" rx="4" fill="#3b82f6"/>
  <text x="290" y="269" font-size="12" font-weight="700" fill="#1e40af" font-family="sans-serif">2.2x</text>

  <!-- Average line -->
  <line x1="309" y1="58" x2="309" y2="280" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <text x="312" y="55" font-size="9" font-weight="500" fill="#d97706" font-family="sans-serif">avg 2.4x</text>

  <!-- Bottom note -->
  <text x="350" y="315" text-anchor="middle" font-size="10" fill="#9ca3af" font-family="sans-serif">GID = I_geo(S) / |T| | Measured on GPL Tokenizer v0.1.0 with ARCS level 6</text>
</svg>
