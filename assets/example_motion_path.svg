<svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" width="800" height="280">
  <!-- White background -->
  <rect width="800" height="280" fill="white"/>

  <!-- Title -->
  <text x="400" y="30" font-size="22" font-weight="bold" text-anchor="middle" font-family="sans-serif" fill="#1f2937">SVG Motion Path — Geometric Trajectory Encoding</text>

  <!-- Define the circuit path (simplified racing circuit) -->
  <defs>
    <path id="circuitPath" d="M150,80 Q200,50 250,70 Q300,90 320,140 Q310,180 260,200 Q200,210 150,190 Q120,170 130,130 Q140,90 150,80"/>
  </defs>

  <!-- Background circuit (dashed) -->
  <g>
    <use href="#circuitPath" stroke="#e5e7eb" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  </g>

  <!-- Filled path overlay (solid) showing trajectory -->
  <g>
    <use href="#circuitPath" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Sample coordinate points along the path -->
  <circle cx="150" cy="80" r="2.5" fill="#9ca3af" opacity="0.6"/>
  <circle cx="210" cy="58" r="2.5" fill="#9ca3af" opacity="0.6"/>
  <circle cx="270" cy="88" r="2.5" fill="#9ca3af" opacity="0.6"/>
  <circle cx="315" cy="145" r="2.5" fill="#9ca3af" opacity="0.6"/>
  <circle cx="300" cy="195" r="2.5" fill="#9ca3af" opacity="0.6"/>
  <circle cx="235" cy="205" r="2.5" fill="#9ca3af" opacity="0.6"/>
  <circle cx="150" cy="195" r="2.5" fill="#9ca3af" opacity="0.6"/>
  <circle cx="125" cy="135" r="2.5" fill="#9ca3af" opacity="0.6"/>

  <!-- Car at position 1 (start) -->
  <g transform="translate(150, 78)">
    <rect x="-4" y="-4" width="8" height="8" fill="#2563eb" rx="1"/>
    <text x="0" y="18" font-size="9" text-anchor="middle" font-family="sans-serif" fill="#6b7280">t=0</text>
  </g>

  <!-- Car at position 2 (mid-progress) -->
  <g transform="translate(270, 88)">
    <rect x="-4" y="-4" width="8" height="8" fill="#3b82f6" rx="1"/>
    <text x="0" y="18" font-size="9" text-anchor="middle" font-family="sans-serif" fill="#6b7280">t=0.5</text>
  </g>

  <!-- Car at position 3 (near end) -->
  <g transform="translate(220, 195)">
    <rect x="-4" y="-4" width="8" height="8" fill="#60a5fa" rx="1"/>
    <text x="0" y="18" font-size="9" text-anchor="middle" font-family="sans-serif" fill="#6b7280">t=0.9</text>
  </g>

  <!-- Token annotation at bottom -->
  <rect x="40" y="235" width="720" height="40" fill="#f3f4f6" rx="4"/>
  <text x="50" y="256" font-size="12" font-family="sans-serif" fill="#1f2937">
    <tspan font-weight="bold">GPL Path Encoding:</tspan> [MOVE][CUBIC q6:x,y...][CUBIC q6:x,y...][G1][κ5]...
  </text>
  <text x="50" y="271" font-size="11" font-family="sans-serif" fill="#6b7280">
    Points encode trajectory; squares show motion stages along Bézier curve path
  </text>
</svg>
